<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅游足迹 - 记录你的旅行故事</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .map-container { height: 600px; width: 100%; }
        /* 侧边栏样式优化 */
        .sidebar-item:hover { background-color: rgba(22, 93, 255, 0.05); color: #165DFF; }
        .sidebar-item.active { background-color: rgba(22, 93, 255, 0.1); color: #165DFF; border-right: 3px solid #165DFF; }
    </style>
</head>
<body class="bg-gray-50 flex">

    <aside class="w-64 bg-white h-screen sticky top-0 border-r border-gray-200 flex flex-col z-50">
        <div class="p-6">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                    <i class="fas fa-map-marked-alt text-xl"></i>
                </div>
                <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600">TravelFoot</span>
            </div>
        </div>
        
        <nav class="flex-1 px-4 py-4 space-y-2">
            <a href="#" class="sidebar-item active flex items-center gap-4 px-4 py-3 rounded-xl transition-all">
                <i class="fas fa-home w-5"></i><span class="font-medium">概览</span>
            </a>
            <a href="#" class="sidebar-item flex items-center gap-4 px-4 py-3 rounded-xl transition-all text-gray-500">
                <i class="fas fa-map w-5"></i><span class="font-medium">足迹地图</span>
            </a>
        </nav>

        <div class="p-4 border-t border-gray-100">
            <button id="authBtn" class="w-full flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 rounded-xl transition-all">
                <i class="fas fa-user-circle text-xl"></i>
                <span id="authBtnText" class="font-medium">登录 / 注册</span>
            </button>
        </div>
    </aside>

    <main class="flex-1 min-h-screen p-8">
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-10">
            <div>
                <h1 class="text-3xl font-bold text-gray-900 mb-2">欢迎回来！</h1>
                <p class="text-gray-500">今天想去哪里探索？点击按钮开始记录你的新足迹。</p>
            </div>
            <div class="flex gap-4">
                <button id="startBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-2xl font-semibold shadow-lg shadow-blue-200 transition-all flex items-center gap-2">
                    <i class="fas fa-plus-circle"></i> 标记足迹
                </button>
            </div>
        </header>

        <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden relative">
            <div class="p-6 border-b border-gray-50 flex items-center justify-between">
                <h2 class="text-lg font-bold">足迹分布图</h2>
                <div id="statsInfo" class="text-sm text-blue-600 font-medium bg-blue-50 px-3 py-1 rounded-full">已标记 0 个省份</div>
            </div>
            <div id="china-map" class="map-container"></div>
            <div id="mapLoader" class="absolute inset-0 bg-white bg-opacity-90 z-10 flex flex-col items-center justify-center transition-opacity">
                <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-600 border-t-transparent mb-4"></div>
                <p class="text-gray-500">正在同步足迹数据...</p>
            </div>
        </div>
    </main>

    <script>
        // --- 1. 配置修正 (解决空格和重名问题) ---
        const SUPABASE_URL = 'https://wdncyjuunekqxqm dqcka.supabase.co'.replace(/\s/g, ''); // 自动去空格
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; // 这里填入你完整的Key

        // 重要：重命名实例，避免与全局库名 'supabase' 冲突
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let myChart = null;
        let currentUser = null;
        let visitedProvinces = [];

        // --- 2. 页面加载初始化 ---
        document.addEventListener('DOMContentLoaded', () => {
            initApp();
        });

        async function initApp() {
            // A. 初始化地图框架
            initMap();
            // B. 绑定按钮点击事件
            bindEvents();
            // C. 检查登录状态并加载数据
            checkAuth();
        }

        // --- 3. 身份验证逻辑 ---
        async function checkAuth() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            handleAuthStateChange(session?.user);

            // 监听登录状态实时变化
            supabaseClient.auth.onAuthStateChange((event, session) => {
                handleAuthStateChange(session?.user);
            });
        }

        function handleAuthStateChange(user) {
            currentUser = user;
            const btnText = document.getElementById('authBtnText');
            if (user) {
                btnText.innerText = user.email.split('@')[0];
                fetchFootprints(); // 登录后抓取数据
            } else {
                btnText.innerText = '登录 / 注册';
                visitedProvinces = [];
                updateMap([]);
            }
        }

        // --- 4. 按钮事件绑定 ---
        function bindEvents() {
            // 登录按钮
            document.getElementById('authBtn').onclick = async () => {
                if (currentUser) {
                    if(confirm('是否退出登录？')) await supabaseClient.auth.signOut();
                } else {
                    const email = prompt("邮箱:");
                    const password = prompt("密码:");
                    if(email && password) {
                        const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
                        if(error) alert("登录失败: " + error.message);
                    }
                }
            };

            // 标记足迹按钮
            document.getElementById('startBtn').onclick = async () => {
                if (!currentUser) return alert('请先登录！');
                
                const province = prompt("输入你想标记的省份 (如: 广东、北京):");
                if (!province) return;

                const { error } = await supabaseClient
                    .from('travel_footprints')
                    .insert([{ user_id: currentUser.id, province: province }]);

                if (error) {
                    console.error(error);
                    alert("保存失败，请检查数据库表名是否为 travel_footprints");
                } else {
                    alert("标记成功！");
                    fetchFootprints(); // 刷新地图
                }
            };
        }

        // --- 5. 地图与数据逻辑 ---
        async function initMap() {
            const chartDom = document.getElementById('china-map');
            myChart = echarts.init(chartDom);
            
            try {
                // 加载中国地图JSON
                const response = await fetch('https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json');
                const geoJson = await response.json();
                echarts.registerMap('china', geoJson);
                updateMap([]); // 初始空地图
                document.getElementById('mapLoader').style.opacity = '0';
                setTimeout(() => document.getElementById('mapLoader').style.display = 'none', 500);
            } catch (e) {
                console.error("地图加载失败", e);
                document.getElementById('mapLoader').innerHTML = "地图数据加载失败，请检查网络。";
            }
        }

        async function fetchFootprints() {
            if (!currentUser) return;
            const { data, error } = await supabaseClient
                .from('travel_footprints')
                .select('province')
                .eq('user_id', currentUser.id);

            if (!error && data) {
                visitedProvinces = data.map(d => ({ name: d.province, value: 1 }));
                updateMap(visitedProvinces);
                document.getElementById('statsInfo').innerText = `已标记 ${data.length} 个省份`;
            }
        }

        function updateMap(data) {
            const option = {
                tooltip: { trigger: 'item', formatter: '{b}' },
                visualMap: {
                    min: 0, max: 1, show: false,
                    inRange: { color: ['#f8fafc', '#3b82f6'] }
                },
                series: [{
                    type: 'map',
                    map: 'china',
                    label: { show: false },
                    itemStyle: { borderColor: '#e2e8f0', areaColor: '#f8fafc' },
                    emphasis: { itemStyle: { areaColor: '#93c5fd' } },
                    data: data
                }]
            };
            myChart.setOption(option);
        }

        window.onresize = () => myChart?.resize();
    </script>
</body>
</html>
